<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Emoji Grill </title>
    <link rel="icon" type="image/png" href="https://cdn.hackclub.com/019d7d6e-4e66-7292-b02b-1ec8fa56bd4c/image.png">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body id="mainBody">
    <div class="chaos-overlay"></div>
    
    <div class="sticker s1"><img src="https://cdn.hackclub.com/019d7d6e-4e66-7292-b02b-1ec8fa56bd4c/image.png"></div>
    <div class="sticker s2"><img src="https://cdn.hackclub.com/019d7d6e-5031-7429-8655-2f62bf756d91/image.png"></div>

    <div class="motherboard" id="board">
        <header>
            <div class="header-top">
                <h1>The Emoji Grill</h1>
                <button class="btn-stealth" onclick="toggleStealth()">[ STEALTH ]</button>
            </div>
            <div id="status-display">Grill Heated</div>
        </header>

        <div class="instruction-panel">
            <button class="btn-help" onclick="toggleHelp()">HOW TO USE [?]</button>
            <div id="help-content">
                <ul>
                    <li>🍳 <strong>COOK:</strong> Input text, enter Salt, hit COOK.</li>
                    <li>🍽️ <strong>EAT:</strong> Paste emojis + Salt, hit EAT.</li>
                    <li>🎨 <strong>THEME:</strong> Themes are auto-detected on decrypt.</li>
                    <li>💣 <strong>WIPE:</strong> Purge memory and explode interface.</li>
                </ul>
            </div>
        </div>

        <div class="io-zone">
            <label class="section-label">FLAVOR THEME</label>
            <select id="themeSelect" onchange="changeTheme()">
                <option value="kitchen">KITCHEN (Food)</option>
                <option value="chaos">TOTAL_CHAOS (Dark)</option>
                <option value="fusion">FUSION (Tropical)</option>
            </select>

            <div class="file-sector">
                <button class="btn-file" onclick="document.getElementById('fileInput').click()">[+] ATTACH_FILE</button>
                <input type="file" id="fileInput" class="hidden" onchange="handleFileSelect(this)">
                <span id="file-name-display">NO_FILE_LOADED</span>
            </div>

            <textarea id="inputField" placeholder="Enter text or emojis..."></textarea>
            
            <label class="section-label">AUTHENTICATION SALT</label>
            <div class="salt-input-group">
                <input type="password" id="passField" placeholder="Salt code..." oninput="checkSaltStrength()">
                <div class="salt-controls">
                    <button id="togglePass" class="salt-btn" onclick="togglePassword()">👁️</button>
                    <button class="salt-btn btn-gen" onclick="generatePass()">⚡</button>
                </div>
            </div>
            <div class="strength-meter">
                <div id="strength-bar"></div>
                <span id="strength-text">SALT_LEVEL: EMPTY</span>
            </div>
            
            <div class="action-grid">
                <button class="btn-cook" onclick="handleAction('encrypt')">COOK</button>
                <button class="btn-eat" onclick="handleAction('decrypt')">EAT</button>
            </div>

            <div id="qr-container" class="hidden">
                <div id="qrcode"></div>
                <button class="btn-close-qr" onclick="toggleQR(false)">CLOSE QR</button>
            </div>

            <textarea id="outputField" readonly placeholder="Resulting cipher..."></textarea>
            
            <div class="footer-actions">
                <button class="btn-copy" onclick="copyText()">GRAB 📋</button>
                <button class="btn-qr" onclick="generateQRCode()">QR 📱</button>
            </div>
            
            <button class="btn-wipe" onclick="triggerExplosion()">WIPE ENGINE 💣</button>
        </div>
    </div>

    <div id="panic-overlay" class="hidden">
        <div class="panic-box">
            <h2 class="panic-title">WIPE_PENDING</h2>
            <div id="panic-timer">3</div>
        </div>
    </div>

    <audio id="snd-click" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>
    <audio id="snd-sizzle" src="https://www.soundjay.com/nature/sounds/fire-1.mp3"></audio>
    <audio id="snd-ding" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>

    <script src="script.js"></script>
</body>
</html>
