<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Emoji Grill</title>
    <link rel="icon" type="image/png" href="https://cdn.hackclub.com/019d8220-34ca-77ec-a36f-1be2d90152e4/image.png"
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="chaos-overlay"></div>

    <div class="sticker s1"><img src="https://cdn.hackclub.com/019d7d6e-4e66-7292-b02b-1ec8fa56bd4c/image.png"></div>
    <div class="sticker s2"><img src="https://cdn.hackclub.com/019d7d6e-5031-7429-8655-2f62bf756d91/image.png"></div>
    <div class="sticker s3"><img src="https://cdn.hackclub.com/019d7d6e-51f8-7609-864a-757da899be44/image.png"></div>
    <div class="sticker s4"><img src="https://cdn.hackclub.com/019d7d71-91a5-78a5-aaa9-dc41a05d6191/image.png"></div>

    <div class="motherboard">
        <header>
            <h1 class="neon-text">Emoji Grill</h1>
            <div id="status-display">Grill Heating 🔥</div>
        </header>

        <div class="gauge-sector">
            <div id="heat-fill"></div>
            <span id="heat-text">VOLTAGE: 0.0V</span>
        </div>

        <div class="io-zone">
            <label>INPUT_RAW_DATA</label>
            <textarea id="inputField" placeholder="FEED THE MACHINE..."></textarea>

            <label>ENCRYPTION_SALT</label>
            <input type="text" id="passField" placeholder="SEASONING...">
            
            <div class="action-grid">
                <button class="btn-cook" onclick="run('encrypt')">COOK 🍳</button>
                <button class="btn-eat" onclick="run('decrypt')">EAT 🍽️</button>
            </div>

            <label>OUTPUT_STREAM</label>
            <div class="result-box">
                <textarea id="outputField" readonly placeholder="AWAITING_INPUT"></textarea>
            </div>
            <button class="btn-copy" onclick="copyText()">PRINT_RECEIPT 📋</button>
        </div>
    </div>

    <audio id="snd-click" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>
    <audio id="snd-sizzle" src="https://www.soundjay.com/nature/sounds/fire-1.mp3"></audio>
    <audio id="snd-ding" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>

    <script src="script.js"></script>
</body>
</html>
